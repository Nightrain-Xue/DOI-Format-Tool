<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOI 引用生成器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f9f9f9;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #f1f1f1;
            border-radius: 6px;
            min-height: 50px;
            word-wrap: break-word;
        }
        .loading { color: #666; font-style: italic; }
        .error { color: red; }
    </style>
</head>
<body>

<div class="container">
    <h2>血液鱼 の DOI 自动引用生成器</h2>
    
    <label for="doiInput">输入 DOI (例如: 10.1038/nature12373):</label>
    <input type="text" id="doiInput" placeholder="输入 DOI...">

    <label for="styleSelect">选择期刊格式:</label>
    <select id="styleSelect">
        <option value="apa">APA</option>
        <option value="modern-language-association">MLA</option>
        <option value="ieee">IEEE</option>
        <option value="chicago-author-date">Chicago</option>
    </select>

    <button onclick="generateCitation()">生成引用</button>

    <div class="result-box" id="resultBox">等待生成...</div>
    
    <button id="copyBtn" style="display: none; background-color: #28a745;" onclick="copyToClipboard()">
        复制到剪贴板
    </button>
</div>

<script>
    async function generateCitation() {
        const doi = document.getElementById('doiInput').value.trim();
        const style = document.getElementById('styleSelect').value;
        const resultBox = document.getElementById('resultBox');
        const copyBtn = document.getElementById('copyBtn');

        if (!doi) {
            resultBox.innerHTML = '<span class="error">请输入 DOI！</span>';
            return;
        }

        // 清理 DOI 字符串，防止用户复制了多余的网址前缀
        const cleanDoi = doi.replace(/^(https?:\/\/)?(dx\.)?doi\.org\//i, '');
        
        resultBox.innerHTML = '<span class="loading">正在查询数据库...</span>';
        copyBtn.style.display = 'none';

        try {
            // 向 DOI 官方解析库发送请求，利用 Content Negotiation 直接获取排版好的文本
            const response = await fetch(`https://doi.org/${cleanDoi}`, {
                headers: {
                    'Accept': `text/x-bibliography; style=${style}`
                }
            });

            if (!response.ok) {
                throw new Error('找不到该 DOI，请检查输入是否正确');
            }

            const citation = await response.text();
            resultBox.innerText = citation;
            copyBtn.style.display = 'block'; // 显示复制按钮

        } catch (error) {
            resultBox.innerHTML = `<span class="error">生成失败: ${error.message}</span>`;
        }
    }

    // 剪贴板复制功能
    function copyToClipboard() {
        const resultText = document.getElementById('resultBox').innerText;
        navigator.clipboard.writeText(resultText).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.innerText = '✅ 复制成功！';
            setTimeout(() => btn.innerText = '复制到剪贴板', 2000);
        });
    }
</script>

</body>
</html>
